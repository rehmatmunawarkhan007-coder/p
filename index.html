<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Check</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
    position: relative;
}

/* Floating hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    opacity: 0.7;
}
.heart::before, .heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}
.heart::before { top: -10px; left: 0; }
.heart::after { left: 10px; top: 0; }

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); }
    100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.9);
    padding: 50px 60px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    z-index: 10;
    position: relative;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5em;
    color: #ff4e50;
    margin-bottom: 40px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    animation: floatText 3s infinite;
}

@keyframes floatText {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    position: relative;
}

.buttons button {
    padding: 15px 35px;
    font-size: 1.3em;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.queen { background: #ff4e50; color: white; }
.not-queen { background: #ccc; color: #333; }

.buttons button:hover { transform: scale(1.1); }

.confetti {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="container" id="mainContainer">
    <h1>U Are A…</h1>
    <div class="buttons">
        <button class="queen" onclick="queenClick()">Queen</button>
        <button class="not-queen" id="notQueenBtn">Not a Queen</button>
    </div>
</div>

<script>
// Floating hearts
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.width = heart.style.height = (10 + Math.random()*20) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

// Not a Queen button moves
const notQueenBtn = document.getElementById('notQueenBtn');
const container = document.getElementById('mainContainer');
notQueenBtn.addEventListener('mouseenter', moveButton);

function moveButton() {
    const containerRect = container.getBoundingClientRect();
    const btnWidth = notQueenBtn.offsetWidth;
    const btnHeight = notQueenBtn.offsetHeight;

    const maxX = containerRect.width - btnWidth;
    const maxY = containerRect.height - btnHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    notQueenBtn.style.position = 'absolute';
    notQueenBtn.style.left = randomX + 'px';
    notQueenBtn.style.top = randomY + 'px';
}

// Queen click - improved confetti
function queenClick() {
    alert("👑 Of course! You're truly a Queen! 👑");
    for(let i=0;i<120;i++){
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.backgroundColor = ['#ff0','#f0f','#0ff','#0f0','#f00','#f90'][Math.floor(Math.random()*6)];
        confetti.style.left = Math.random()*window.innerWidth+'px';
        confetti.style.top = '-20px';
        confetti.style.width = confetti.style.height = (5+Math.random()*12)+'px';
        confetti.style.transform = 'rotate('+Math.random()*360+'deg)';
        document.body.appendChild(confetti);

        let top = -20;
        const fall = setInterval(()=>{
            top += 5 + Math.random()*5;
            confetti.style.top = top + 'px';
            if(top > window.innerHeight){
                confetti.remove();
                clearInterval(fall);
            }
        }, 20);
    }
}
</script>

</body>
</html>
